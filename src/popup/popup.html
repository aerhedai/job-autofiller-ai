<!doctype html>
<html>
  <head>

    <title>Job Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

    <div id="app">
      <h3>Job Autofill</h3>

    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
