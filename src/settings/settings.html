<!-- settings/settings.html -->

<script src="settings.js" type="module"></script>

<h1>Manage Profiles</h1>

<ul id="profileList"></ul>

<button id="addProfile">Add New Profile</button>

<form id="profileForm">
  <input type="text" id="displayName" placeholder="Full Name" required />
  <input type="email" id="email" placeholder="Email" required />
  <input type="text" id="phone" placeholder="Phone" />
  <input type="text" id="country" placeholder="Country" />
  <input type="text" id="address" placeholder="Address" />
  <input type="text" id="rightToWork" placeholder="Right to Work" />
  <input type="text" id="degree" placeholder="Degree" />
  <button type="submit">Save Profile</button>
</form>
